name: Auto Translate Blog Posts

on:
  push:
    branches:
      - main
    paths:
      - 'content/pt/**/*.md'
  workflow_dispatch: # Permite rodar manualmente na aba Actions

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install deep-translator

      - name: Run Translation Script
        run: python scripts/translate.py

      - name: Commit and Push Translations
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adiciona apenas as traduções geradas no diretório em inglês
          git add content/en/
          
          # Só faz o commit se houverem mudanças reais
          if git diff --staged --quiet; then
            echo "Nenhuma tradução nova para comitar."
          else
            git commit -m "chore(i18n): auto-translate novos posts para inglês"
            git push
          fi
